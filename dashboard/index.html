const DASHBOARD_HTML = `

<!DOCTYPE html>
<html>
<head>

<title>India20Sixty Dashboard</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.card{
background:#222;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

button{
padding:10px 16px;
margin-right:10px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

.progress{
height:10px;
background:#333;
border-radius:4px;
overflow:hidden;
}

.bar{
height:100%;
background:#2ecc71;
}

.stage{
font-size:18px;
}

</style>

</head>

<body>

<h1>India20Sixty Dashboard</h1>

<div class="card">

<h2>Create Job</h2>

<button onclick="createJob()">Create Video Job</button>

</div>

<div class="card">

<h2>Video Pipeline</h2>

<table id="jobs">

<thead>

<tr>
<th>Topic</th>
<th>Images</th>
<th>Voice</th>
<th>Render</th>
<th>Upload</th>
<th>Progress</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

async function createJob(){

const r = await fetch("/run")
const data = await r.json()

alert("Job created: " + data.job_id)

loadJobs()

}

function stageIcon(stage,current){

const order = ["pending","processing","images","voice","render","upload","complete"]

const currentIndex = order.indexOf(current)
const stageIndex = order.indexOf(stage)

if(current==="complete") return "✅"

if(stageIndex < currentIndex) return "✅"

if(stageIndex === currentIndex) return "🔄"

return "⏳"

}

function progressValue(status){

const map={
pending:5,
processing:10,
images:25,
voice:50,
render:75,
upload:90,
complete:100
}

return map[status] || 0

}

async function loadJobs(){

const r = await fetch("/jobs")
const jobs = await r.json()

const tbody = document.querySelector("#jobs tbody")

tbody.innerHTML=""

jobs.forEach(j=>{

const row=document.createElement("tr")

const progress = progressValue(j.status)

row.innerHTML=\`

<td>\${j.topic}</td>

<td class="stage">\${stageIcon("images",j.status)}</td>

<td class="stage">\${stageIcon("voice",j.status)}</td>

<td class="stage">\${stageIcon("render",j.status)}</td>

<td class="stage">\${stageIcon("upload",j.status)}</td>

<td>

<div class="progress">
<div class="bar" style="width:\${progress}%"></div>
</div>

\${progress}%

</td>

\`

tbody.appendChild(row)

})

}

loadJobs()

setInterval(loadJobs,5000)

</script>

</body>
</html>

`
