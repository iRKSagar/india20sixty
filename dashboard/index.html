const DASHBOARD_HTML = `
<!DOCTYPE html>
<html>
<head>

<title>India20Sixty Pipeline Dashboard</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.card{
background:#222;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

button{
padding:10px 16px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:center;
}

.progress{
height:10px;
background:#333;
border-radius:4px;
overflow:hidden;
}

.bar{
height:100%;
background:#2ecc71;
}

</style>

</head>

<body>

<h1>India20Sixty Pipeline Dashboard</h1>

<div class="card">
<button onclick="createJob()">Create Video Job</button>
</div>

<div class="card">

<table id="jobs">

<thead>
<tr>
<th>Topic</th>
<th>Images</th>
<th>Voice</th>
<th>Render</th>
<th>Upload</th>
<th>Progress</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

function stageIcon(stage,current){

var order=["pending","processing","images","voice","render","upload","complete"]

var c=order.indexOf(current)
var s=order.indexOf(stage)

if(current==="complete") return "✅"
if(s<c) return "✅"
if(s===c) return "🔄"
return "⏳"

}

function progressValue(status){

var map={
pending:5,
processing:10,
images:25,
voice:50,
render:75,
upload:90,
complete:100
}

return map[status]||0

}

async function createJob(){

var r=await fetch("/run")
var data=await r.json()

alert("Job created: "+data.job_id)

loadJobs()

}

async function loadJobs(){

var r=await fetch("/jobs")
var jobs=await r.json()

var tbody=document.querySelector("#jobs tbody")

tbody.innerHTML=""

jobs.forEach(function(j){

var progress=progressValue(j.status)

var row=document.createElement("tr")

row.innerHTML=
"<td>"+j.topic+"</td>"+
"<td>"+stageIcon("images",j.status)+"</td>"+
"<td>"+stageIcon("voice",j.status)+"</td>"+
"<td>"+stageIcon("render",j.status)+"</td>"+
"<td>"+stageIcon("upload",j.status)+"</td>"+
"<td>"+
"<div class='progress'>"+
"<div class='bar' style='width:"+progress+"%'></div>"+
"</div>"+progress+"%"+
"</td>"

tbody.appendChild(row)

})

}

loadJobs()

setInterval(loadJobs,5000)

</script>

</body>
</html>
`
